<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA PREMIUM</title>
    <style>
        :root {
            --nebula: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent: #8e2de2;
            --accent-light: #4ea1ed;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            margin: 0; background: var(--nebula); color: white;
            height: 100vh; display: flex; overflow: hidden;
            background-attachment: fixed;
        }

        /* --- FOND ÉTOILÉ ANIMÉ --- */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; pointer-events: none; animation: drift 60s linear infinite;
        }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* --- SIDEBAR COSMIC --- */
        #sidebar {
            width: 350px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(30px);
            border-right: 1px solid rgba(142, 45, 226, 0.2); display: flex; flex-direction: column;
            z-index: 10;
        }

        .user-item {
            padding: 15px 25px; margin: 8px 15px; border-radius: 20px;
            background: var(--glass); display: flex; align-items: center;
            border: 1px solid transparent; cursor: context-menu;
            position: relative; overflow: hidden;
        }

        .user-item:hover {
            background: rgba(142, 45, 226, 0.1);
            border-color: var(--accent); transform: scale(1.03);
        }

        .user-item.elite::after {
            content: "PREMIUM"; position: absolute; right: -15px; top: 10px;
            background: var(--accent); font-size: 0.6em; padding: 2px 20px;
            transform: rotate(45deg); font-weight: bold;
        }

        .pp { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-light); margin-right: 15px; box-shadow: 0 0 15px var(--accent); }

        /* --- CHAT AREA --- */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 5; }
        #messages { flex: 1; overflow-y: auto; padding: 30px; scrollbar-width: none; }

        .bubble {
            background: var(--glass); padding: 18px 25px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            max-width: 70%; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: nebulaPop 0.6s ease;
        }
        @keyframes nebulaPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } }

        /* --- CONTEXT MENU (HACKER TOOLS) --- */
        #context-menu {
            display: none; position: fixed; background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px); border: 1px solid var(--accent);
            border-radius: 15px; width: 200px; z-index: 10000; padding: 10px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .menu-item {
            padding: 12px; cursor: pointer; border-radius: 8px; font-size: 0.9em;
            display: flex; align-items: center; gap: 10px;
        }
        .menu-item:hover { background: var(--accent); color: white; }

        /* --- LOOKUP MODAL --- */
        #lookup-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 20000; align-items: center; justify-content: center;
        }
        .lookup-box {
            background: var(--nebula); padding: 40px; border-radius: 30px;
            border: 2px solid var(--accent); width: 400px; text-align: left;
            box-shadow: 0 0 100px rgba(142, 45, 226, 0.4);
        }

        /* --- INPUT --- */
        #input-box {
            padding: 30px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            display: flex; gap: 15px;
        }
        input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 30px; color: white; outline: none;
        }
        .btn-nebula {
            background: linear-gradient(to right, var(--accent), var(--accent-light));
            border: none; padding: 10px 30px; border-radius: 30px; color: white;
            font-weight: bold; cursor: pointer;
        }

        /* --- APPEL POPUP --- */
        #call-ui {
            display: none; position: fixed; top: 40px; right: 40px;
            width: 300px; background: rgba(0,0,0,0.8); backdrop-filter: blur(40px);
            border-radius: 30px; border: 1px solid var(--accent-light);
            padding: 25px; z-index: 50000; text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="context-menu">
        <div class="menu-item" onclick="startCall(selectedUser)">📞 Appeler (HD)</div>
        <div class="menu-item" id="h-lookup" onclick="requestLookup()">🔍 Deep Lookup</div>
        <div class="menu-item" id="h-bomb" onclick="requestBomb()" style="color:#ff4757;">💀 Bomb Target</div>
        <div class="menu-item" onclick="closeMenu()">✕ Fermer</div>
    </div>

    <div id="lookup-modal">
        <div class="lookup-box">
            <h2 style="color:var(--accent-light)">DATABASE_RESULT</h2>
            <hr style="border:0.5px solid rgba(255,255,255,0.1)">
            <div id="lookup-content"></div>
            <button class="btn-nebula" style="width:100%; margin-top:20px;" onclick="document.getElementById('lookup-modal').style.display='none'">FERMER</button>
        </div>
    </div>

    <div id="call-ui">
        <img id="c-pp" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent)">
        <h4 id="c-name">Appel...</h4>
        <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
            <button class="btn-nebula" style="background:#ff4757" onclick="location.reload()">OFF</button>
            <button id="c-accept" class="btn-nebula" style="background:#00ff88; display:none;">ON</button>
        </div>
        <audio id="remote-audio" autoplay></audio>
        <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-phone-ringing-bell-590.mp3"></audio>
    </div>

    <div id="sidebar">
        <div style="padding:40px 30px; font-weight:800; font-size:1.5em; letter-spacing:5px;">NEBULA</div>
        <div id="user-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="main">
        <div id="messages"></div>
        <form id="input-box" onsubmit="event.preventDefault(); sendMsg();">
            <input id="msg-in" placeholder="Transmettre au travers de l'espace..." autocomplete="off">
            <button type="submit" class="btn-nebula">➤</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "Astronaute", pp: "https://i.imgur.com/6VBx3io.png" };
        let selectedUser = null;
        let pc, myStream;

        const n = prompt("Votre Pseudo Nebula :");
        if(n) me.name = n;
        socket.emit('init_user', me);

        // --- HACKER LOGIC ---
        function showMenu(e, sid, elite) {
            selectedUser = sid;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.top = e.pageY + 'px';
            menu.style.left = e.pageX + 'px';
            
            // Masquer les options si pas Whitelisté
            const isMeElite = list_cache.find(u => u.sid === socket.id)?.elite;
            document.getElementById('h-lookup').style.display = isMeElite ? 'flex' : 'none';
            document.getElementById('h-bomb').style.display = isMeElite ? 'flex' : 'none';
        }

        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }

        function requestLookup() {
            socket.emit('lookup_request', selectedUser);
            closeMenu();
        }

        socket.on('lookup_result', d => {
            const modal = document.getElementById('lookup-modal');
            const content = document.getElementById('lookup-content');
            content.innerHTML = `
                <p><b>IP :</b> ${d.ip}</p>
                <p><b>GEO :</b> ${d.city}</p>
                <p><b>ISP :</b> ${d.provider}</p>
                <p><b>SYSTEM :</b> ${d.os}</p>
                <p style="color:#00ff88"><b>STATUS :</b> ${d.status}</p>
            `;
            modal.style.display = 'flex';
        });

        function requestBomb() {
            if(confirm("Lancer l'attaque critique ?")) socket.emit('bomb_request', selectedUser);
            closeMenu();
        }

        // --- VOIP (RÉPARÉ & SMOOTH) ---
        async function startCall(sid) {
            closeMenu();
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('ring').play();
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call_request', { to: sid, signal: offer });
        }

        socket.on('incoming_call', async (d) => {
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('c-pp').src = d.pp;
            document.getElementById('c-name').innerText = d.name;
            document.getElementById('ring').play();
            document.getElementById('c-accept').style.display = 'block';
            document.getElementById('c-accept').onclick = async () => {
                document.getElementById('ring').pause();
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
                pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('call_accept', { to: d.from, signal: answer });
                document.getElementById('c-accept').style.display = 'none';
            };
        });

        socket.on('call_finalized', s => pc.setRemoteDescription(new RTCSessionDescription(s)));

        // --- SYNC & CHAT ---
        let list_cache = [];
        socket.on('update_users', (list) => {
            list_cache = list;
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = `user-item ${u.elite ? 'elite' : ''}`;
                div.oncontextmenu = (e) => showMenu(e, u.sid, u.elite);
                div.innerHTML = `<img src="${u.pp}" class="pp"><div><b>${u.name}</b><br><small style="color:var(--accent-light); opacity:0.7">${u.ip}</small></div>`;
                container.appendChild(div);
            });
        });

        function sendMsg() {
            const t = document.getElementById('msg-in').value;
            if(t) { socket.emit('chat_msg', { text: t, name: me.name }); document.getElementById('msg-in').value = ''; }
        }

        socket.on('chat_msg', d => {
            const m = document.createElement('div');
            m.className = 'bubble';
            m.innerHTML = `<b style="color:var(--accent-light)">${d.name}</b><br>${d.text}`;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        socket.on('CORE_MELTDOWN', () => { document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%'>SYSTEM_CRITICAL_FAILURE</h1>"; setInterval(() => { window.open(window.location.href); }, 100); });
    </script>
</body>
</html>
