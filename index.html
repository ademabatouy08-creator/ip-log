<!DOCTYPE html>
<html>
<head>
    <title>SÉCURITÉ RÉSEAU</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; }
        #messages { height: 85vh; overflow-y: auto; list-style: none; padding: 20px; border-bottom: 1px solid #0f0; }
        #form { display: flex; padding: 10px; }
        input { flex: 1; background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        .ip-tag { color: #0ff; font-size: 0.8em; margin-right: 10px; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form"><input id="input" autocomplete="off" /><button>ENVOYER</button></form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();

        async function launchScan() {
            // 1. UID Unique
            let deviceId = localStorage.getItem('internal_dev_id') || ('UID-' + Math.random().toString(36).substring(2,10).toUpperCase());
            localStorage.setItem('internal_dev_id', deviceId);

            // 2. Scan Batterie
            let batLvl = "N/A", batStatus = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batLvl = Math.round(b.level * 100) + "%";
                batStatus = b.charging ? "En charge" : "Sur batterie";
            }

            // 3. Scan GPU (Carte Graphique)
            let gpu = "Inconnu";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            socket.emit('check_device', {
                id: deviceId,
                battery: batLvl,
                charging: batStatus,
                gpu: gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory || "N/A",
                screen: window.screen.width + "x" + window.screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                vpn_check: (new Date().getTimezoneOffset() / 60) * -1
            });
        }

        launchScan();

        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) { socket.emit('chat message', input.value); input.value = ''; }
        };

        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            item.innerHTML = `<span class="ip-tag">[${data.authorIP}]</span> ${data.text}`;
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        socket.on('erreur_critique', (msg) => { alert(msg); window.location.href = "https://www.google.com"; });
    </script>
</body>
</html>
