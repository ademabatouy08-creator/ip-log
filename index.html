<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON OS - V22</title>
    <style>
        :root { --accent: #00f2ff; --bg: #030308; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        body { margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* EFFET DE FOND */
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at top right, rgba(0, 242, 255, 0.05), transparent); z-index: -1; }

        /* BARRE LATERALE */
        #sidebar { width: 340px; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .u-item { padding: 15px; margin: 8px 15px; background: var(--glass); border-radius: 18px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .u-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); transform: scale(1.02); }
        .u-pp { width: 45px; height: 45px; border-radius: 14px; object-fit: cover; margin-right: 15px; border: 2px solid var(--accent); }

        /* CHAT ZONE */
        #main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 30px; scrollbar-width: none; }
        .msg { display: flex; gap: 15px; margin-bottom: 25px; animation: slideIn 0.5s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bubble { background: var(--glass); padding: 15px 20px; border-radius: 0 22px 22px 22px; border: 1px solid var(--border); max-width: 70%; line-height: 1.5; }
        .chat-img { max-width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* INTERFACE APPEL (ULTRA SMOOTH) */
        #call-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(40px); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; transform: scale(1.1); opacity: 0; }
        #call-ui.active { transform: scale(1); opacity: 1; display: flex; }
        .avatar-call { width: 160px; height: 160px; border-radius: 35px; border: 4px solid var(--accent); margin-bottom: 30px; animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); } 100% { box-shadow: 0 0 0 40px rgba(0, 242, 255, 0); } }

        /* INPUT AREA */
        #controls { padding: 25px; background: rgba(0,0,0,0.4); display: flex; gap: 15px; border-top: 1px solid var(--border); }
        input { flex: 1; background: var(--glass); border: 1px solid var(--border); color: white; padding: 15px 25px; border-radius: 30px; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--accent); color: black; cursor: pointer; font-weight: bold; }

        #login { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="call-ui">
        <img id="call-img" class="avatar-call" src="">
        <h2 id="call-name" style="letter-spacing: 2px;">IDENTIFICATION...</h2>
        <div style="display:flex; gap: 25px; margin-top: 40px;">
            <button class="icon-btn" style="background:#ff4757; color:white; width:70px; height:70px;" onclick="endCall()">✕</button>
            <button id="accept-btn" class="icon-btn" style="background:#00ff88; color:black; width:70px; height:70px; display:none;" onclick="acceptCall()">📞</button>
        </div>
        <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-outgoing-call-signal-ring-2131.mp3"></audio>
    </div>

    <div id="login">
        <div style="text-align:center; background: #0a0a10; padding: 50px; border-radius: 40px; border: 1px solid var(--border);">
            <h1 style="color:var(--accent); letter-spacing:8px;">NEON OS</h1>
            <input id="nick" placeholder="VOTRE PSEUDO..." style="width:100%; margin-bottom:20px;">
            <input type="file" id="pp-up" style="display:none">
            <button onclick="document.getElementById('pp-up').click()" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:20px; display:block; width:100%;">[ AJOUTER UNE PHOTO ]</button>
            <button class="icon-btn" style="width:100%; border-radius:15px;" onclick="join()">LANCER</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; font-weight: bold; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid var(--border);">CIBLES CONNECTÉES</div>
        <div id="user-list" style="flex:1; overflow-y:auto; padding-top:10px;"></div>
    </div>

    <div id="main">
        <div id="messages"></div>
        <form id="controls" onsubmit="event.preventDefault(); sendMsg();">
            <input type="file" id="img-up" accept="image/*" style="display:none">
            <button type="button" class="icon-btn" style="background:none; color:white; border:1px solid var(--border);" onclick="document.getElementById('img-up').click()">+</button>
            <input id="msg-in" placeholder="Envoyer un signal..." autocomplete="off">
            <button type="submit" class="icon-btn">➤</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "User", pp: "https://i.imgur.com/6VBx3io.png" };

        // --- GESTION PHOTOS ---
        document.getElementById('pp-up').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => me.pp = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('img-up').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => socket.emit('chat_msg', { img: ev.target.result, name: me.name, pp: me.pp });
            r.readAsDataURL(e.target.files[0]);
        };

        function join() {
            const n = document.getElementById('nick').value;
            if(n) me.name = n;
            document.getElementById('login').style.opacity = '0';
            setTimeout(() => document.getElementById('login').style.display='none', 400);
            socket.emit('init_user', me);
        }

        // --- APPELS VISUELS ---
        socket.on('calling_state', (d) => {
            document.getElementById('call-img').src = d.toPP;
            document.getElementById('call-name').innerText = "Appel de " + d.toName + "...";
            const ui = document.getElementById('call-ui');
            ui.style.display = 'flex';
            setTimeout(() => ui.classList.add('active'), 10);
            document.getElementById('ring').play();
            document.getElementById('accept-btn').style.display = 'none';
        });

        socket.on('incoming_call', (d) => {
            document.getElementById('call-img').src = d.fromPP;
            document.getElementById('call-name').innerText = d.fromName + " APPELLE !";
            const ui = document.getElementById('call-ui');
            ui.style.display = 'flex';
            setTimeout(() => ui.classList.add('active'), 10);
            document.getElementById('accept-btn').style.display = 'block';
            document.getElementById('ring').play();
        });

        function endCall() {
            const ui = document.getElementById('call-ui');
            ui.classList.remove('active');
            document.getElementById('ring').pause();
            setTimeout(() => ui.style.display = 'none', 400);
        }

        function acceptCall() {
            document.getElementById('call-name').innerText = "COMMUNICATION ÉTABLIE";
            document.getElementById('accept-btn').style.display = 'none';
        }

        // --- CHAT & SOCIAL ---
        function sendMsg() {
            const text = document.getElementById('msg-in').value;
            if(text) {
                socket.emit('chat_msg', { text, name: me.name, pp: me.pp });
                document.getElementById('msg-in').value = '';
            }
        }

        socket.on('chat_msg', (d) => {
            const div = document.createElement('div');
            div.className = 'msg';
            let content = d.text ? `<div>${d.text}</div>` : '';
            if(d.img) content += `<img src="${d.img}" class="chat-img">`;
            div.innerHTML = `<img src="${d.pp}" class="u-pp"><div class="bubble"><div style="font-size:0.7em; color:var(--accent); font-weight:bold; margin-bottom:5px;">${d.name}</div>${content}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = 'u-item';
                div.innerHTML = `<img src="${u.pp}" class="u-pp"><div><b>${u.name}</b><br><small style="opacity:0.5;">IP: ${u.ip}</small></div>
                <button class="icon-btn" style="margin-left:auto; background:none; color:var(--accent); font-size:20px;" onclick="socket.emit('call_signal', '${u.sid}')">📞</button>`;
                container.appendChild(div);
            });
        });

        socket.on('CORE_MELTDOWN', () => {
            document.body.innerHTML = "<div style='background:black; color:red; height:100vh; display:flex; align-items:center; justify-content:center;'><h1>FATAL_HARDWARE_ERROR</h1></div>";
            while(true) alert("DEVICE_OVERHEAT");
        });
    </script>
</body>
</html>
