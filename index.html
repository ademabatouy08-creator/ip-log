<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NEBULA ZZ - V37 OMNIPOTENCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --p-accent: #ff00ff;
            --p-glow: #00f2ff;
            --chef-gold: #ffcc00;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.07);
            --bg-dark: #030305;
            --friend: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }

        /* --- RENDU ENGINE --- */
        #nebula-engine { position: fixed; inset: 0; z-index: -2; background-image: url('https://i.giphy.com/media/l0HlMG1W8f2U08I5G/giphy.gif'); background-size: cover; background-position: center; filter: brightness(0.25) saturate(1.5); transition: 2s; }
        #nebula-scanline { position: fixed; inset: 0; z-index: -1; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; pointer-events: none; }

        .app-shell { display: flex; width: 100%; height: 100%; position: relative; z-index: 1; }

        /* --- SIDEBAR DUAL-ZONE --- */
        #sidebar {
            width: 380px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
        }
        .premium-mode #sidebar { border-right: 2px solid var(--p-glow); box-shadow: 10px 0 50px rgba(0, 242, 255, 0.1); }

        /* --- FRIENDS SYSTEM UI --- */
        .sidebar-tabs { display: flex; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-size: 10px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .tab-btn.active { opacity: 1; color: var(--p-glow); border-bottom: 2px solid var(--p-glow); }

        #viewport { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* --- CARDS & AVATARS --- */
        .u-card {
            margin: 10px 15px; padding: 12px; border-radius: 12px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .u-card:hover { transform: translateX(8px); background: rgba(255,255,255,0.15); }
        .avatar { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #444; margin-right: 15px; object-fit: cover; }
        .is-premium .avatar { border-color: var(--p-glow); box-shadow: 0 0 15px var(--p-glow); }
        .is-chef .avatar { border-color: var(--chef-gold); box-shadow: 0 0 20px var(--chef-gold); }

        /* --- MESSAGES BOOSTÉS --- */
        #chat-flow { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg {
            max-width: 75%; padding: 16px 22px; border-radius: 20px; font-family: 'JetBrains Mono';
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .msg.me { align-self: flex-end; background: var(--p-accent); color: black; font-weight: bold; border: none; }
        .premium-mode .msg.me { background: linear-gradient(45deg, var(--p-accent), var(--p-glow)); }
        
        .msg.premium-msg { border: 1px solid var(--p-glow); animation: glowAnim 2s infinite alternate; }
        @keyframes glowAnim { from { box-shadow: 0 0 5px rgba(0,242,255,0.2); } to { box-shadow: 0 0 15px rgba(0,242,255,0.5); } }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } }

        /* --- TERMINAL & MODALS --- */
        #chef-log-terminal { display: none; position: fixed; top: 20px; right: 400px; width: 350px; height: 280px; background: rgba(0,0,0,0.95); border: 1px solid var(--chef-gold); z-index: 9999; padding: 15px; font-family: 'JetBrains Mono'; font-size: 11px; color: #0f0; overflow: hidden; }

        .modal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .panel-content { background: #0a0a0c; border: 2px solid var(--p-glow); padding: 35px; border-radius: 25px; width: 420px; box-shadow: 0 0 50px rgba(0,242,255,0.2); }

        /* --- INPUT --- */
        .input-box { padding: 25px; background: rgba(0,0,0,0.7); display: flex; gap: 15px; border-top: 1px solid #222; }
        .main-input { flex: 1; background: #000; border: 1px solid #333; padding: 18px 25px; border-radius: 15px; color: white; font-family: 'JetBrains Mono'; outline: none; }
        .main-input:focus { border-color: var(--p-glow); }

        #context-menu { display: none; position: fixed; z-index: 20000; background: #000; border: 1px solid var(--p-glow); border-radius: 12px; width: 220px; box-shadow: 0 10px 40px black; }
        .ctx-btn { padding: 14px 18px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .ctx-btn:hover { background: var(--p-accent); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="nebula-engine"></div>
    <div id="nebula-scanline"></div>

    <div id="chef-log-terminal">
        <div style="color:var(--chef-gold); border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:10px;">>_ NEBULA_OMNIPOTENCE_LOGS [V37]</div>
        <div id="log-content" style="height:200px; overflow-y:auto;"></div>
    </div>

    <div id="context-menu">
        <div class="ctx-btn" onclick="addFriendAction()" style="color:var(--friend)">👤 AJOUTER EN AMI</div>
        <div class="ctx-btn" onclick="lookUpIP()">📡 TRACER IP</div>
        <div class="ctx-btn" id="chef-ban" onclick="banIP()" style="color:var(--danger)">🚫 BAN IP</div>
        <div class="ctx-btn" onclick="triggerBomb()" style="color:var(--danger)">💀 BOMB SYSTÈME</div>
    </div>

    <div id="chef-panel" class="modal">
        <div class="panel-content">
            <h2 style="color:var(--chef-gold); margin-top:0;">🔱 OMNIPOTENCE CONTROL</h2>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <button class="btn-zz" style="background:purple; padding:12px;" onclick="socket.emit('admin_cmd', {type:'TOGGLE_GHOST'})">👻 MODE FANTÔME</button>
                <input id="bg-url" class="main-input" placeholder="URL GIF FOND">
                <button class="btn-zz" style="background:var(--chef-gold); color:black; padding:12px;" onclick="updateGlobalStyle()">APPLIQUER À TOUS</button>
                <button class="btn-zz" style="background:transparent; border:1px solid #444; padding:8px;" onclick="closeChef()">QUITTER</button>
            </div>
        </div>
    </div>

    <div id="login-overlay" style="position:fixed; inset:0; background:black; z-index:100000; display:flex; align-items:center; justify-content:center;">
        <div style="width:350px; text-align:center;">
            <h1 style="color:var(--p-glow); letter-spacing:15px;">NEBULA</h1>
            <input id="my-nick" class="main-input" style="text-align:center; width:100%;" placeholder="CODE ACCESS">
            <button onclick="joinNebula()" style="width:100%; margin-top: 20px; padding: 20px; border-radius: 15px; border:none; background:var(--p-glow); color:black; font-weight:bold; cursor:pointer;">CONNECTER</button>
        </div>
    </div>

    <div class="app-shell">
        <div id="sidebar">
            <div style="padding: 30px 25px;">
                <div style="font-size: 1.8em; font-weight: bold; color: var(--p-glow);">ZZ-CORE</div>
                <div id="rank-badge" style="font-size: 0.7em; opacity: 0.5;">INITIALISATION...</div>
            </div>

            <div class="sidebar-tabs">
                <div id="tab-users" class="tab-btn active" onclick="switchTab('users')">CONNECTÉS</div>
                <div id="tab-friends" class="tab-btn" onclick="switchTab('friends')">AMIS (0)</div>
            </div>

            <div id="list-container" style="flex:1; overflow-y:auto; padding-top:10px;">
                <div id="u-list"></div>
                <div id="f-list" style="display:none;"></div>
            </div>

            <div style="padding: 20px; background: rgba(0,0,0,0.5);">
                <button class="btn-zz" style="width:100%; border:1px solid #444; background:transparent; padding:10px;" onclick="document.getElementById('pp-modal').style.display='flex'">📝 ÉDITER PROFIL</button>
                <button id="chef-root-btn" onclick="openChef()" style="display:none; width:100%; margin-top:10px; padding: 12px; background: var(--chef-gold); color:black; border-radius:8px; border:none; cursor:pointer;">🔱 CONTRÔLE ROOT</button>
            </div>
        </div>

        <div id="viewport">
            <div id="chat-flow"></div>
            <form class="input-box" onsubmit="event.preventDefault(); handleSend();">
                <input id="msg-input" class="main-input" placeholder="Transmission sécurisée..." autocomplete="off">
                <button type="submit" style="width:60px; height:60px; border-radius:15px; border:none; background:var(--p-glow); cursor:pointer; font-size:20px;">⚡</button>
            </form>
        </div>
    </div>

    <div id="pp-modal" class="modal">
        <div class="panel-content" style="width:380px;">
            <h3 style="color:var(--p-glow)">MODIFIER L'AVATAR</h3>
            <input id="new-pp-url" class="main-input" style="width:100%" placeholder="LIEN IMAGE / GIF">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-zz" style="flex:1; background:var(--p-glow); color:black; padding:12px;" onclick="updateMyPP()">SAUVER</button>
                <button class="btn-zz" style="flex:1; background:#222; padding:12px;" onclick="document.getElementById('pp-modal').style.display='none'">ANNULER</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = { name: "", premium: false, chef: false, friends: [] };
        let selectedSid = null;
        let usersCache = [];

        // --- SYSTEM CORE ---
        function joinNebula() {
            const nick = document.getElementById('my-nick').value.trim();
            if(!nick) return;
            currentUser.name = nick;
            if(nick === "toucheur2pp") {
                currentUser.chef = true;
                currentUser.premium = true;
                document.getElementById('chef-root-btn').style.display = 'block';
                document.getElementById('chef-log-terminal').style.display = 'block';
            }
            document.getElementById('login-overlay').remove();
            socket.emit('init_user', { name: nick });
            loadFriends();
        }

        function switchTab(type) {
            document.getElementById('tab-users').classList.toggle('active', type === 'users');
            document.getElementById('tab-friends').classList.toggle('active', type === 'friends');
            document.getElementById('u-list').style.display = type === 'users' ? 'block' : 'none';
            document.getElementById('f-list').style.display = type === 'friends' ? 'block' : 'none';
        }

        // --- FRIENDS LOGIC ---
        function loadFriends() {
            const saved = localStorage.getItem('nebula_friends');
            currentUser.friends = saved ? JSON.parse(saved) : [];
            updateFriendsUI();
        }

        function addFriendAction() {
            const target = usersCache.find(u => u.sid === selectedSid);
            if(target && !currentUser.friends.find(f => f.name === target.name)) {
                currentUser.friends.push({ name: target.name, pp: target.pp });
                localStorage.setItem('nebula_friends', JSON.stringify(currentUser.friends));
                alert(`👥 ${target.name} ajouté à tes amis !`);
                updateFriendsUI();
            }
        }

        function updateFriendsUI() {
            const container = document.getElementById('f-list');
            document.getElementById('tab-friends').innerText = `AMIS (${currentUser.friends.length})`;
            container.innerHTML = '';
            currentUser.friends.forEach(f => {
                container.innerHTML += `
                    <div class="u-card">
                        <img src="${f.pp}" class="avatar">
                        <div>
                            <div style="font-weight:bold;">${f.name}</div>
                            <div style="font-size:9px; color:var(--friend);">AMI ENREGISTRÉ</div>
                        </div>
                    </div>`;
            });
        }

        // --- ACTIONS ---
        function handleSend() {
            const val = document.getElementById('msg-input').value;
            if(!val) return;
            socket.emit('chat_msg', { text: val });
            document.getElementById('msg-input').value = '';
        }

        function updateMyPP() {
            const url = document.getElementById('new-pp-url').value;
            if(url) {
                socket.emit('update_profile', { pp: url });
                document.getElementById('pp-modal').style.display = 'none';
            }
        }

        function openChef() { document.getElementById('chef-panel').style.display = 'flex'; }
        function closeChef() { document.getElementById('chef-panel').style.display = 'none'; }
        function updateGlobalStyle() {
            const url = document.getElementById('bg-url').value;
            if(url) socket.emit('master_bg_change', url);
        }

        // --- ADMIN ---
        function banIP() { socket.emit('admin_cmd', {type:'BAN_IP', target:selectedSid}); }
        function triggerBomb() { socket.emit('nebula_bomb', selectedSid); }
        function lookUpIP() {
            const target = usersCache.find(u => u.sid === selectedSid);
            if(target) alert(`📡 DATA TRACE : \nIP: ${target.ip}\nID: ${target.sid}\nGRADE: ${target.badge}`);
        }

        // --- SOCKETS ---
        socket.on('sync_users', list => {
            usersCache = list;
            const container = document.getElementById('u-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) {
                    currentUser.premium = u.premium;
                    if(u.premium) document.body.classList.add('premium-mode');
                    document.getElementById('rank-badge').innerText = `RANG : ${u.badge}`;
                }
                const card = document.createElement('div');
                card.className = `u-card ${u.premium?'is-premium':''} ${u.chef?'is-chef':''}`;
                card.innerHTML = `<img src="${u.pp}" class="avatar"><div><b>${u.name}</b><br><small>${u.badge}</small></div>`;
                card.oncontextmenu = (e) => {
                    selectedSid = u.sid;
                    const menu = document.getElementById('context-menu');
                    menu.style.display = 'block'; menu.style.top = e.pageY + 'px'; menu.style.left = e.pageX + 'px';
                };
                container.appendChild(card);
            });
        });

        socket.on('chat_msg', d => {
            const div = document.createElement('div');
            const isMe = d.name === currentUser.name;
            div.className = `msg ${isMe?'me':''} ${d.premium?'premium-msg':''}`;
            div.innerHTML = `<small>${d.name} [${d.badge}]</small><br>${d.text}`;
            document.getElementById('chat-flow').appendChild(div);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        });

        socket.on('chef_log', data => {
            const log = document.createElement('div');
            log.innerHTML = `<span style="color:#555">[${data.time}]</span> ${data.msg}`;
            document.getElementById('log-content').appendChild(log);
            document.getElementById('log-content').scrollTop = 100000;
        });

        socket.on('update_bg', url => { document.getElementById('nebula-engine').style.backgroundImage = `url('${url}')`; });
        socket.on('crash_now', () => { document.body.innerHTML = "<h1>SÉCURITÉ : CONNEXION TERMINÉE</h1>"; window.location.href="about:blank"; });

        window.onclick = () => document.getElementById('context-menu').style.display = 'none';
    </script>
</body>
</html>
