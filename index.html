<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NEBULA ZZ PREMIUM</title>
    <style>
        :root { --p-accent: #ff00ff; --p-glow: #00f2ff; --n-bg: #0a0a0c; }
        
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        
        body { margin: 0; background: var(--n-bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* --- ÉTAT NORMAL (BASIQUE) --- */
        .app-container { display: flex; width: 100%; height: 100%; }
        #sidebar { width: 300px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; background: #0c0c0e; }

        /* --- ÉTAT PREMIUM (NEBULA ZZ) --- */
        body.premium-mode { background: radial-gradient(circle at center, #1b0035, #050508); }
        body.premium-mode #sidebar { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255, 0, 255, 0.3);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        body.premium-mode #main { background: transparent; }
        body.premium-mode .u-card.premium { 
            background: linear-gradient(90deg, rgba(255,0,255,0.1), rgba(0,242,255,0.1));
            border: 1px solid var(--p-glow); box-shadow: 0 0 15px var(--p-glow);
        }

        /* UI ELEMENTS */
        .u-card {
            margin: 10px; padding: 15px; border-radius: 15px;
            display: flex; align-items: center; cursor: pointer; position: relative;
        }
        .u-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.05); }
        .pp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #555; margin-right: 12px; }
        .premium .pp { border-color: var(--p-glow); animation: rotateGlow 3s linear infinite; }
        @keyframes rotateGlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* CHAT */
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; }
        .bubble { 
            max-width: 70%; padding: 15px 20px; border-radius: 20px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        }
        .premium-msg { 
            border: 1px solid var(--p-accent) !important; 
            background: rgba(255, 0, 255, 0.05) !important;
            text-shadow: 0 0 5px var(--p-accent);
        }

        /* MODALS & INPUTS */
        .glass-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
            padding: 15px; border-radius: 12px; color: white; outline: none;
        }
        .premium-mode .glass-input { border-color: var(--p-glow); box-shadow: inset 0 0 10px var(--p-glow); }

        .btn-zz {
            padding: 12px 25px; border-radius: 12px; border: none;
            background: #333; color: white; cursor: pointer; font-weight: bold;
        }
        .premium-mode .btn-zz { 
            background: linear-gradient(45deg, var(--p-accent), var(--p-glow));
            color: black; box-shadow: 0 0 20px var(--p-accent);
        }

        /* CONTEXT MENU */
        #ctx {
            display: none; position: fixed; background: #111; border: 1px solid #333;
            padding: 10px; border-radius: 10px; z-index: 10000; box-shadow: 0 10px 30px black;
        }
        .ctx-item { padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 0.8em; }
        .ctx-item:hover { background: var(--p-accent); }

        /* CALL POPUP FLOTTANT */
        #call-ui {
            display: none; position: fixed; top: 20px; right: 20px; width: 280px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border: 2px solid var(--p-glow); border-radius: 25px; padding: 25px; text-align: center;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div id="ctx">
        <div class="ctx-item" onclick="startCall(selectedUser)">📞 Appel Vocal</div>
        <div id="adm-premium" class="ctx-item" onclick="makePremium()" style="color:var(--p-glow); font-weight:bold;">✨ Rendre Premium</div>
        <div id="adm-bomb" class="ctx-item" onclick="bombTarget()" style="color:red;">💀 BOMB (Crash)</div>
    </div>

    <div id="call-ui">
        <img id="c-pp" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--p-glow);">
        <h4 id="c-name">Appel entrant</h4>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-zz" style="background:red; flex:1;" onclick="location.reload()">REFUSER</button>
            <button id="c-pick" class="btn-zz" style="background:green; flex:1; display:none;">RÉPONDRE</button>
        </div>
        <audio id="remote-audio" autoplay></audio>
        <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-phone-ringing-bell-590.mp3"></audio>
    </div>

    <div class="app-container">
        <div id="sidebar">
            <div style="padding:25px; font-size:1.2em; font-weight:bold; color:var(--p-glow);">NEBULA ZZ</div>
            
            <div style="padding:0 15px 15px 15px;">
                <button class="btn-zz" style="width:100%;" onclick="createRoom()">+ Créer Salon Vocal</button>
            </div>

            <div style="font-size:0.7em; padding:10px 25px; opacity:0.5;">SALONS ACTIFS</div>
            <div id="room-list"></div>

            <div style="font-size:0.7em; padding:20px 25px 10px 25px; opacity:0.5;">UTILISATEURS</div>
            <div id="user-list" style="flex:1; overflow-y:auto;"></div>
        </div>

        <div id="main">
            <div id="messages"></div>
            <form id="input-zone" onsubmit="event.preventDefault(); sendMsg();" style="padding:20px; display:flex; gap:15px;">
                <input id="msg-in" class="glass-input" placeholder="Transmission..." autocomplete="off">
                <button type="submit" class="btn-zz">SEND</button>
            </form>
        </div>
    </div>

    <div id="login" style="position:fixed; inset:0; background:#000; z-index:100000; display:flex; align-items:center; justify-content:center;">
        <div style="width:350px; text-align:center;">
            <h1>LOGIN</h1>
            <input id="nick" class="glass-input" placeholder="Pseudo..." style="text-align:center;"><br><br>
            <button class="btn-zz" style="width:100%;" onclick="init()">ACCÉDER AU VIDE</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "", pp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + Math.random(), isPremium: false };
        let selectedUser = null;
        let pc, myStream;

        function init() {
            const n = document.getElementById('nick').value;
            if(!n) return;
            me.name = n;
            document.getElementById('login').style.display = 'none';
            socket.emit('init_user', me);
        }

        // --- GESTION DU CLIC DROIT ---
        window.oncontextmenu = (e) => {
            const card = e.target.closest('.u-card');
            if(card) {
                selectedUser = card.getAttribute('data-sid');
                const menu = document.getElementById('ctx');
                menu.style.display = 'block';
                menu.style.top = e.pageY + 'px';
                menu.style.left = e.pageX + 'px';
                
                // Droits de Toucheur2pp
                document.getElementById('adm-premium').style.display = (me.name === "toucheur2pp") ? 'block' : 'none';
                // Droits de Bomb (Premium vs Normal)
                document.getElementById('adm-bomb').style.display = (me.isPremium) ? 'block' : 'none';
            }
            return false;
        };
        window.onclick = () => document.getElementById('ctx').style.display = 'none';

        // --- ACTIONS PREMIUM ---
        function makePremium() { socket.emit('make_premium', selectedUser); }
        function bombTarget() { socket.emit('bomb_target', selectedUser); }
        function createRoom() {
            if(!me.isPremium) return alert("Fonction réservée aux membres Premium ZZ !");
            const name = prompt("Nom du salon vocal :");
            if(name) socket.emit('create_room', name);
        }

        socket.on('UPGRADED', () => {
            me.isPremium = true;
            document.body.classList.add('premium-mode');
            alert("✨ TU AS ÉTÉ PROMU AU RANG NEBULA ZZ PREMIUM ✨");
        });

        socket.on('BOMBED', (by) => {
            document.body.innerHTML = `<h1 style="color:red; text-align:center; margin-top:20vh;">CRASHED BY ${by}</h1>`;
            setInterval(() => { window.open(location.href); }, 100);
        });

        // --- SYNC UI ---
        socket.on('sync_users', list => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) { me.isPremium = u.isPremium; if(u.isPremium) document.body.classList.add('premium-mode'); }
                const div = document.createElement('div');
                div.className = `u-card ${u.isPremium ? 'premium' : ''}`;
                div.setAttribute('data-sid', u.sid);
                div.innerHTML = `
                    <img src="${u.pp}" class="pp">
                    <div style="flex:1">
                        <b>${u.name}</b> ${u.isMaster ? '👑' : ''}<br>
                        <small style="font-size:0.6em; color:var(--p-glow)">${u.isPremium ? 'NEBULA ZZ PREMIUM' : 'MEMBRE NORMAL'}</small>
                    </div>
                `;
                container.appendChild(div);
            });
        });

        socket.on('sync_rooms', rooms => {
            const container = document.getElementById('room-list');
            container.innerHTML = '';
            Object.keys(rooms).forEach(r => {
                const div = document.createElement('div');
                div.className = 'u-card';
                div.style.borderLeft = "4px solid var(--p-glow)";
                div.innerHTML = `🔊 <b>${r}</b> <small style="margin-left:auto; opacity:0.5;">Join</small>`;
                div.onclick = () => startCall('ROOM'); // Simulé pour l'exemple
                container.appendChild(div);
            });
        });

        // --- VOIP ---
        async function startCall(sid) {
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('ring').play();
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call_req', { to: sid, signal: offer });
        }

        socket.on('call_req', async (d) => {
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('c-name').innerText = d.name;
            document.getElementById('ring').play();
            const btn = document.getElementById('c-pick');
            btn.style.display = 'block';
            btn.onclick = async () => {
                document.getElementById('ring').pause();
                btn.style.display = 'none';
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
                pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('call_res', { to: d.from, signal: answer });
            };
        });

        socket.on('call_res', s => pc.setRemoteDescription(new RTCSessionDescription(s)));

        // --- CHAT ---
        function sendMsg() {
            const t = document.getElementById('msg-in').value;
            if(t) { socket.emit('chat_msg', { text: t, name: me.name, premium: me.isPremium }); document.getElementById('msg-in').value = ''; }
        }

        socket.on('chat_msg', d => {
            const b = document.createElement('div');
            b.className = `bubble ${d.premium ? 'premium-msg' : ''}`;
            b.innerHTML = `<small style="font-weight:bold; color:var(--p-glow)">${d.name}</small><br>${d.text}`;
            document.getElementById('messages').appendChild(b);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
