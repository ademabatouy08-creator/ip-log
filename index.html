<!DOCTYPE html>
<html>
<head>
    <title>NETWORK ANALYZER v4</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; }
        #chat-container { max-width: 1000px; margin: 20px auto; border: 1px solid #0f0; height: 90vh; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        #header { padding: 15px; border-bottom: 1px solid #0f0; background: #050505; text-align: center; font-size: 1.2em; text-shadow: 0 0 5px #0f0; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; list-style: none; background: repeating-linear-gradient(0deg, rgba(0,20,0,0.1) 0px, rgba(0,20,0,0.1) 1px, transparent 1px, transparent 2px); }
        .msg { margin-bottom: 10px; border-bottom: 1px solid #030; padding-bottom: 5px; }
        .ip-tag { color: #0ff; font-weight: bold; }
        #form { display: flex; padding: 15px; background: #050505; }
        input { flex: 1; background: transparent; border: 1px solid #0f0; color: #0f0; padding: 10px; font-family: 'Courier New'; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 0 30px; margin-left: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">CORE-DATA INTERCEPTOR - ENCRYPTED CHANNEL</div>
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Entrez une commande ou un message..." />
            <button>EXECUTE</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();

        // COLLECTE MASSIVE DE DONNÉES
        let deviceId = localStorage.getItem('internal_dev_id');
        if (!deviceId) {
            deviceId = 'UID-' + Math.random().toString(36).substring(2, 10).toUpperCase() + '-' + Date.now();
            localStorage.setItem('internal_dev_id', deviceId);
        }

        const scanData = {
            id: deviceId,
            platform: navigator.platform,
            browser: navigator.userAgent.split(' ').pop(),
            screen: window.screen.width + "x" + window.screen.height,
            lang: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cores: navigator.hardwareConcurrency || "Inconnu",
            ram: navigator.deviceMemory || "Inconnue"
        };

        socket.emit('check_device', scanData);

        var form = document.getElementById('form');
        var input = document.getElementById('input');

        form.onsubmit = function(e) {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        };

        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            item.className = 'msg';
            item.innerHTML = `<span class="ip-tag">[${data.authorIP}]</span> ${data.text}`;
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        socket.on('erreur_critique', (msg) => { 
            alert(msg); 
            window.location.href = "https://www.google.com"; 
        });
        socket.on('info', (msg) => { alert(msg); });
    </script>
</body>
</html>
