<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX OMEGA</title>
    <style>
        :root { --main: #5865F2; --bg: #0b0b0e; --glass: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR PRO */
        #nav { width: 70px; background: #050505; display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #1a1a1a; }
        .nav-icon { width: 45px; height: 45px; border-radius: 15px; background: #1e1e1e; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .nav-icon:hover { border-radius: 10px; background: var(--main); }

        #sidebar { width: 280px; background: #0f0f12; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* APPEL DISCORD */
        #call-ui { display: none; position: fixed; inset: 0; background: #0b0b0e; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .call-pp { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--main); margin-bottom: 20px; }
        .pulse { animation: p 1.5s infinite; }
        @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.4); } 100% { box-shadow: 0 0 0 40px rgba(88, 101, 242, 0); } }

        /* BOITE AUX LETTRES / AJOUTER */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .box { background: #1e1e24; padding: 25px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; }
        
        .u-card { display: flex; align-items: center; padding: 12px; margin: 8px; background: var(--glass); border-radius: 12px; cursor: pointer; border: 1px solid transparent; }
        .u-card:hover { background: rgba(255,255,255,0.06); border-color: var(--main); }
        .u-pp { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--main); }

        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; background: var(--main); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nav">
        <div class="nav-icon" title="Profil">👤</div>
        <div class="nav-icon" onclick="openModal('add-box')" title="Ajouter / Boîte aux lettres">📩</div>
        <div class="nav-icon" onclick="createGroup()" title="Créer Groupe">📁</div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold; color: #555;">UTILISATEURS</div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <div id="messages" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:20px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
            <input id="msg-in" placeholder="Envoyer un message..." style="margin:0;">
            <button class="btn" onclick="send()">➤</button>
        </div>

        <div id="call-ui">
            <img id="call-img" class="call-pp pulse" src="">
            <h2 id="call-name">Appel...</h2>
            <div style="display:flex; gap: 20px; margin-top: 40px;">
                <button class="btn" style="background:#ff4757; width:60px; height:60px; border-radius:50%;" onclick="location.reload()">✕</button>
                <button id="answer-btn" class="btn" style="background:#2ed573; width:60px; height:60px; border-radius:50%; display:none;">📞</button>
            </div>
            <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-phone-ringing-bell-590.mp3"></audio>
            <audio id="remote-audio" autoplay></audio>
        </div>
    </div>

    <div id="add-box" class="modal">
        <div class="box">
            <h3>Boîte aux Lettres</h3>
            <p style="font-size:0.8em; opacity:0.5;">Entre le pseudo pour envoyer une demande</p>
            <input id="add-name" placeholder="Pseudo de l'ami...">
            <button class="btn" onclick="closeModal('add-box')">Envoyer</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "User", pp: "https://i.imgur.com/6VBx3io.png" };
        let pc, myStream;

        // Login simplifié pour test
        const n = prompt("Pseudo ?");
        if(n) me.name = n;
        socket.emit('init_user', me);

        // --- REPARATION APPEL (WebRTC) ---
        async function startCall(sid) {
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('ring').play();
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call_start', { to: sid, signal: offer });
        }

        socket.on('incoming_call', async (d) => {
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('call-img').src = d.pp;
            document.getElementById('call-name').innerText = d.name + " appelle...";
            document.getElementById('ring').play();
            document.getElementById('answer-btn').style.display = 'block';

            document.getElementById('answer-btn').onclick = async () => {
                document.getElementById('ring').pause();
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
                pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                
                await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('call_answer', { to: d.from, signal: answer });
                document.getElementById('answer-btn').style.display = 'none';
            };
        });

        socket.on('call_accepted', async (s) => {
            document.getElementById('ring').pause();
            await pc.setRemoteDescription(new RTCSessionDescription(s));
        });

        // --- UI & SOCIAL ---
        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = 'u-card';
                div.innerHTML = `<img src="${u.pp}" class="u-pp"><div><b>${u.name}</b><br><small style="color:var(--main)">${u.ip}</small></div>
                <button onclick="startCall('${u.sid}')" style="margin-left:auto; background:none; border:none; color:var(--main); font-size:18px; cursor:pointer;">📞</button>`;
                container.appendChild(div);
            });
        });

        function send() {
            const t = document.getElementById('msg-in').value;
            if(t) { socket.emit('chat_msg', { text: t, name: me.name }); document.getElementById('msg-in').value = ''; }
        }

        socket.on('chat_msg', d => {
            const m = document.createElement('div');
            m.innerHTML = `<b>${d.name}:</b> ${d.text}`;
            document.getElementById('messages').appendChild(m);
        });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
