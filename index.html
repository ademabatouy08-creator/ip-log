<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON OS V25</title>
    <style>
        :root { --accent: #00f2ff; --bg: #030308; --glass: rgba(255, 255, 255, 0.05); }
        /* SMOOTH TRANSITIONS */
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* PERSONNALISATION DE L'INTERFACE */
        body.theme-ruby { --accent: #ff4757; --bg: #0a0202; }
        body.theme-emerald { --accent: #2ed573; --bg: #020a05; }
        body.theme-gold { --accent: #ffa502; --bg: #0a0802; }

        /* SIDEBAR & CHAT */
        #sidebar { width: 320px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; scrollbar-width: none; }
        
        .u-card { display: flex; align-items: center; padding: 15px; margin: 10px; background: var(--glass); border-radius: 18px; border: 1px solid transparent; }
        .u-card:hover { border-color: var(--accent); transform: translateX(5px); }
        .u-pp { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; }

        /* BUBBLES SMOOTH */
        .msg { display: flex; gap: 12px; margin-bottom: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
        .bubble { background: var(--glass); padding: 15px; border-radius: 0 20px 20px 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 80%; }
        .chat-img { max-width: 100%; border-radius: 15px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* CALL UI */
        #call-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(50px); }
        .call-avatar { width: 150px; height: 150px; border-radius: 40px; border: 4px solid var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); } 100% { box-shadow: 0 0 0 50px rgba(0, 242, 255, 0); } }

        /* CONTROLS */
        .btn-action { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--accent); color: black; cursor: pointer; font-weight: bold; }
        #login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; }
        
        .badge-ip { font-size: 0.7em; color: var(--accent); font-family: monospace; opacity: 0.8; }
    </style>
</head>
<body id="body-tag">

    <div id="call-screen">
        <img id="remote-pp" class="call-avatar" src="">
        <h2 id="call-name" style="letter-spacing: 5px;">SIGNAL ENTRANT</h2>
        <div style="display:flex; gap: 30px; margin-top: 40px;">
            <button class="btn-action" style="background:#ff4757; color:white;" onclick="endCall()">✕</button>
            <button id="answer-btn" class="btn-action" style="background:#2ed573; display:none;">📞</button>
        </div>
        <audio id="remote-audio" autoplay></audio>
        <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-phone-ringing-bell-590.mp3"></audio>
    </div>

    <div id="login">
        <div style="text-align:center; width: 300px;">
            <h1 style="color:var(--accent); letter-spacing:10px;">NEON V25</h1>
            <input id="nick" placeholder="PSEUDO..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #333; background:none; color:white; margin-bottom:15px;">
            
            <p style="font-size:0.8em; opacity:0.6;">CHOISIR MON MODE :</p>
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
                <div onclick="setTheme('')" style="width:30px; height:30px; background:#00f2ff; border-radius:50%; cursor:pointer;"></div>
                <div onclick="setTheme('theme-ruby')" style="width:30px; height:30px; background:#ff4757; border-radius:50%; cursor:pointer;"></div>
                <div onclick="setTheme('theme-emerald')" style="width:30px; height:30px; background:#2ed573; border-radius:50%; cursor:pointer;"></div>
            </div>

            <input type="file" id="pp-up" style="display:none">
            <button onclick="document.getElementById('pp-up').click()" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:20px;">[ CHANGER PHOTO ]</button>
            <button class="btn-action" style="width:100%; border-radius:15px;" onclick="join()">LANCER LE SYSTÈME</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding:25px; font-weight:bold; color:var(--accent); letter-spacing:2px;">RÉSEAU</div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <div id="messages"></div>
        <form id="chat-form" onsubmit="event.preventDefault(); sendMsg();" style="padding:20px; display:flex; gap:10px; background:rgba(0,0,0,0.3);">
            <input type="file" id="img-up" accept="image/*" style="display:none">
            <button type="button" class="btn-action" style="background:none; border:1px solid #333; color:white;" onclick="document.getElementById('img-up').click()">+</button>
            <input id="msg-in" placeholder="Envoyer un signal..." style="flex:1; background:var(--glass); border:none; padding:15px; border-radius:25px; color:white; outline:none;">
            <button type="submit" class="btn-action">➤</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myStream, pc, targetSid;
        let me = { name: "Anonyme", pp: "https://i.imgur.com/6VBx3io.png", theme: "" };

        function setTheme(t) { 
            me.theme = t; 
            document.getElementById('body-tag').className = t; 
        }

        document.getElementById('pp-up').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => me.pp = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('img-up').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => socket.emit('chat_msg', { img: ev.target.result, name: me.name, pp: me.pp });
            r.readAsDataURL(e.target.files[0]);
        };

        async function join() {
            const n = document.getElementById('nick').value;
            if(n) me.name = n;
            document.getElementById('login').style.opacity = '0';
            setTimeout(() => document.getElementById('login').style.display='none', 500);
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            socket.emit('init_user', me);
        }

        // --- AUDIO DISCORD STYLE ---
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        async function startCall(sid) {
            targetSid = sid;
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('ring').play();
            pc = new RTCPeerConnection(config);
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            pc.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { to: targetSid, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call_user', { to: targetSid, signal: offer });
        }

        socket.on('incoming_call', async (d) => {
            targetSid = d.from;
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('remote-pp').src = d.pp;
            document.getElementById('ring').play();
            document.getElementById('answer-btn').style.display = 'block';
            document.getElementById('answer-btn').onclick = async () => {
                document.getElementById('ring').pause();
                pc = new RTCPeerConnection(config);
                myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
                pc.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { to: targetSid, candidate: e.candidate });
                pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('accept_call', { to: targetSid, signal: answer });
                document.getElementById('answer-btn').style.display = 'none';
            };
        });

        socket.on('call_accepted', async (s) => {
            document.getElementById('ring').pause();
            await pc.setRemoteDescription(new RTCSessionDescription(s));
        });

        socket.on('ice_candidate', c => pc && pc.addIceCandidate(new RTCIceCandidate(c)));
        function endCall() { location.reload(); }

        // --- SOCIAL & IP PRIVILÈGE ---
        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = 'u-card';
                div.innerHTML = `
                    <img src="${u.pp}" class="u-pp">
                    <div style="flex:1">
                        <b>${u.name}</b><br>
                        <span class="badge-ip">${u.ip}</span>
                    </div>
                    <button class="btn-action" style="background:none; color:var(--accent); font-size:20px;" onclick="startCall('${u.sid}')">📞</button>
                `;
                container.appendChild(div);
            });
        });

        function sendMsg() {
            const t = document.getElementById('msg-in').value;
            if(t) {
                socket.emit('chat_msg', { text: t, name: me.name, pp: me.pp });
                document.getElementById('msg-in').value = '';
            }
        }

        socket.on('chat_msg', d => {
            const m = document.createElement('div');
            m.className = 'msg';
            let content = d.text ? `<div>${d.text}</div>` : '';
            if(d.img) content += `<img src="${d.img}" class="chat-img">`;
            m.innerHTML = `<img src="${d.pp}" class="u-pp"><div class="bubble"><b style="color:var(--accent); font-size:0.8em;">${d.name}</b><br>${content}</div>`;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
