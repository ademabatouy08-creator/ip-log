<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA SUPREME</title>
    <style>
        :root { --nebula: #0f0c29; --accent: #8e2de2; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        body { margin: 0; background: #000; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* --- FOND ÉTOILÉ --- */
        #stars { position: fixed; inset: 0; background: linear-gradient(135deg, #0f0c29, #1a1a3a); z-index: -1; }

        /* --- NAVIGATION --- */
        #nav { width: 80px; background: rgba(0,0,0,0.4); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-btn { width: 50px; height: 50px; border-radius: 15px; background: var(--glass); margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .nav-btn:hover { background: var(--accent); transform: scale(1.1); }

        /* --- SIDEBARS --- */
        #sidebar { width: 300px; background: rgba(0,0,0,0.2); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        .section-title { padding: 20px; font-size: 0.7em; letter-spacing: 3px; color: var(--accent); font-weight: bold; }

        .u-item { padding: 12px 20px; display: flex; align-items: center; cursor: pointer; border-radius: 15px; margin: 5px 10px; }
        .u-item:hover { background: var(--glass); }
        .pp { width: 40px; height: 40px; border-radius: 12px; margin-right: 12px; border: 2px solid var(--accent); }

        /* --- CHAT AREAS --- */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-title { padding: 20px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .bubble { background: var(--glass); padding: 12px 18px; border-radius: 20px; margin-bottom: 10px; max-width: 80%; border: 1px solid rgba(255,255,255,0.05); }
        .me { align-self: flex-end; border-color: var(--accent); background: rgba(142, 45, 226, 0.1); }

        /* --- FENÊTRE APPEL FLOTTANTE --- */
        #call-ui { display: none; position: fixed; top: 20px; right: 20px; width: 250px; background: rgba(10,10,25,0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--accent); padding: 20px; z-index: 10000; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        /* --- MODAL PERSONNALISATION --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; align-items: center; justify-content: center; }
        .modal-box { background: #161625; padding: 30px; border-radius: 25px; width: 350px; border: 1px solid var(--accent); }

        input, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; outline: none; }
        .btn { padding: 10px 20px; border-radius: 12px; border: none; background: var(--accent); color: white; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="stars"></div>

    <div id="nav">
        <div class="nav-btn" onclick="switchTab('global')">🌌</div>
        <div class="nav-btn" onclick="openModal('profile-modal')">🎨</div>
    </div>

    <div id="sidebar">
        <div class="section-title">UTILISATEURS</div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <div id="chat-title">CANAL GÉNÉRAL</div>
        <div id="messages" style="display: flex; flex-direction: column;"></div>
        <div style="padding: 20px; display: flex; gap: 10px;">
            <input id="msg-in" placeholder="Votre message..." style="margin:0;">
            <button class="btn" style="width: 80px;" onclick="send()">➤</button>
        </div>
    </div>

    <div id="call-ui">
        <img id="c-pp" src="" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent);">
        <div id="c-name" style="margin: 10px 0; font-weight: bold;">Pseudo</div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn" style="background: #ff4757;" onclick="location.reload()">✕</button>
            <button id="c-accept" class="btn" style="background: #00ff88; display: none;">📞</button>
        </div>
        <audio id="remote-audio" autoplay></audio>
        <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-phone-ringing-bell-590.mp3"></audio>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-box">
            <h3>Customiser mon Profil</h3>
            <label>Couleur d'Aura (Hex)</label>
            <input type="color" id="p-aura" value="#8e2de2">
            <label>Bio Nebula</label>
            <textarea id="p-bio" placeholder="Je viens d'une autre galaxie..."></textarea>
            <button class="btn" onclick="saveProfile()">SAUVEGARDER</button>
        </div>
    </div>

    <div id="login-screen" class="modal" style="display: flex;">
        <div class="modal-box">
            <h2 style="text-align: center; color: var(--accent);">NEBULA SUPREME</h2>
            <input id="nick" placeholder="Choisir un pseudo...">
            <button class="btn" onclick="startApp()">LANCER LA SESSION</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "", pp: "https://i.imgur.com/6VBx3io.png", aura: "#8e2de2", bio: "" };
        let currentPeer = "global"; 
        let pc, myStream;

        // --- SESSION FIX (No more re-prompts) ---
        function startApp() {
            const n = document.getElementById('nick').value;
            if(!n) return alert("Pseudo requis !");
            me.name = n;
            document.getElementById('login-screen').style.display = 'none';
            socket.emit('init_user', me);
        }

        function saveProfile() {
            me.aura = document.getElementById('p-aura').value;
            me.bio = document.getElementById('p-bio').value;
            socket.emit('init_user', me); // Update
            closeModal('profile-modal');
        }

        // --- NAVIGATION & PRIVATE CHAT ---
        function switchTab(targetSid, name = "CANAL GÉNÉRAL") {
            currentPeer = targetSid;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('messages').innerHTML = ""; // Clear for privacy
        }

        // --- VOIP FIXED ---
        async function startCall(sid) {
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('ring').play();
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call_request', { to: sid, signal: offer });
        }

        socket.on('incoming_call', async (d) => {
            document.getElementById('call-ui').style.display = 'block';
            document.getElementById('c-pp').src = d.pp;
            document.getElementById('c-name').innerText = d.name;
            document.getElementById('ring').play();
            document.getElementById('c-accept').style.display = 'block';
            document.getElementById('c-accept').onclick = async () => {
                document.getElementById('ring').pause();
                document.getElementById('c-accept').style.display = 'none';
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
                pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('call_accept', { to: d.from, signal: answer });
            };
        });

        socket.on('call_finalized', s => pc.setRemoteDescription(new RTCSessionDescription(s)));

        // --- UI SYNC ---
        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = 'u-item';
                div.style.boxShadow = `inset 0 0 10px ${u.aura}22`;
                div.onclick = () => switchTab(u.sid, "MESSAGE PRIVÉ : " + u.name);
                div.innerHTML = `
                    <img src="${u.pp}" class="pp" style="border-color:${u.aura}">
                    <div style="flex:1">
                        <b>${u.name}</b><br>
                        <small style="opacity:0.5; font-size:0.7em;">${u.bio || 'Nebula User'}</small>
                    </div>
                    <button class="nav-btn" style="width:30px; height:30px; font-size:12px; margin:0;" onclick="event.stopPropagation(); startCall('${u.sid}')">📞</button>
                `;
                container.appendChild(div);
            });
        });

        // --- MESSAGERIE ---
        function send() {
            const t = document.getElementById('msg-in').value;
            if(!t) return;
            if(currentPeer === "global") {
                socket.emit('chat_msg', { text: t, name: me.name });
            } else {
                socket.emit('private_msg', { text: t, to: currentPeer });
            }
            document.getElementById('msg-in').value = "";
        }

        socket.on('chat_msg', d => {
            if(currentPeer !== "global") return;
            renderMsg(d);
        });

        socket.on('private_msg', d => {
            if(currentPeer === "global") return;
            renderMsg(d);
        });

        function renderMsg(d) {
            const m = document.createElement('div');
            m.className = 'bubble' + (d.name === me.name ? ' me' : '');
            m.innerHTML = `<small style="color:var(--accent)">${d.name}</small><br>${d.text}`;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
