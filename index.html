<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY OS - PRIVATE NETWORK</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000 url('https://w0.peakpx.com/wallpaper/521/633/HD-wallpaper-incandescent-stars-sky-galaxy.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; height: 100vh; display: flex; overflow: hidden;
            animation: galaxyMove 100s linear infinite;
        }
        @keyframes galaxyMove { 0% { background-position: 50% 50%; } 50% { background-position: 55% 45%; } 100% { background-position: 50% 50%; } }

        /* MENU ALLIES */
        #side-menu { width: 240px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(125, 95, 255, 0.3); display: flex; flex-direction: column; }
        #side-menu h3 { text-align: center; color: #a29bfe; letter-spacing: 2px; margin: 20px 0; font-size: 0.9em; }
        #friends-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; }
        
        .friend-card {
            padding: 12px; background: rgba(255, 255, 255, 0.05); margin-bottom: 10px;
            border-radius: 12px; font-size: 0.85em; cursor: pointer; border: 1px solid transparent;
            transition: 0.3s; display: flex; align-items: center; justify-content: space-between;
        }
        .friend-card:hover { background: rgba(108, 92, 231, 0.2); border-color: #6c5ce7; transform: scale(1.02); }
        .status-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 8px #2ecc71; }

        /* ZONE CHAT */
        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-header { padding: 15px 25px; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; scroll-behavior: smooth; }

        .msg-container {
            margin-bottom: 15px; padding: 12px; background: rgba(255, 255, 255, 0.07);
            border-radius: 15px; max-width: 75%; animation: msgIn 0.4s ease-out forwards;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-add-friend { background: #6c5ce7; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; }
        .btn-add-friend:disabled { background: #333; cursor: default; opacity: 0.5; }

        /* FENETRE APPEL / PRIVE */
        #call-window {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }

        #form { display: flex; padding: 20px; background: rgba(0,0,0,0.9); gap: 10px; }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #6c5ce7; color: white; padding: 15px; border-radius: 30px; outline: none; }
        .btn { border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-send { background: #6c5ce7; }
        .btn-call { background: #eb4d4b; }
    </style>
</head>
<body>

    <div id="side-menu">
        <h3>📡 ALLIÉS RÉSEAU</h3>
        <ul id="friends-list"></ul>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <span id="current-chat-target">CANAL GÉNÉRAL</span>
            <button class="btn btn-call" id="call-btn" onclick="openPrivateCall()">📞 APPEL PRIVÉ</button>
        </div>
        
        <ul id="messages"></ul>

        <div id="call-window">
            <button onclick="closeCall()" style="position:absolute; top:20px; right:20px; z-index:10000; background:red; border:none; color:white; padding:10px 20px; border-radius:30px; cursor:pointer;">FERMER</button>
            <iframe id="call-iframe" src="" style="width:100%; height:100%; border:none;" allow="camera; microphone; fullscreen; display-capture"></iframe>
        </div>

        <form id="form">
            <input id="input" autocomplete="off" placeholder="Envoyer un message..." />
            <button type="submit" class="btn btn-send">ENVOYER</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let friends = JSON.parse(localStorage.getItem('galaxy_allies_v2')) || [];
        let selectedFriend = null;

        function updateFriendsUI() {
            const list = document.getElementById('friends-list');
            list.innerHTML = friends.map(f => `
                <li class="friend-card" onclick="startPrivateChat('${f}')">
                    <span>👤 ${f}</span>
                    <div class="status-dot"></div>
                </li>
            `).join('');
        }
        updateFriendsUI();

        function startPrivateChat(ip) {
            selectedFriend = ip;
            document.getElementById('current-chat-target').innerText = "PRIVÉ : " + ip;
            document.getElementById('messages').innerHTML = `<li style="text-align:center; opacity:0.5; margin:20px;">Début de la conversation privée avec ${ip}</li>`;
        }

        function addFriend(ip, btn) {
            if (!friends.includes(ip)) {
                friends.push(ip);
                localStorage.setItem('galaxy_allies_v2', JSON.stringify(friends));
                updateFriendsUI();
                btn.disabled = true;
                btn.innerText = "✓";
            }
        }

        function openPrivateCall() {
            if (!selectedFriend) { alert("Choisis un ami dans la liste à gauche d'abord !"); return; }
            // Création d'une salle unique basée sur vos deux IP pour être seuls
            const roomName = "GalaxyPriv-" + btoa(selectedFriend).substring(0,8);
            document.getElementById('call-iframe').src = `https://meet.jit.si/${roomName}#config.startWithVideoMuted=false`;
            document.getElementById('call-window').style.display = 'block';
            socket.emit('chat message', `[PRIVÉ] Je t'appelle ici : https://meet.jit.si/${roomName}`);
        }

        function closeCall() {
            document.getElementById('call-window').style.display = 'none';
            document.getElementById('call-iframe').src = '';
        }

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) {
                const prefix = selectedFriend ? `[PRIVÉ pour ${selectedFriend}] ` : "";
                socket.emit('chat message', prefix + input.value);
                input.value = '';
            }
        };

        socket.on('chat message', (data) => {
            const isAlreadyFriend = friends.includes(data.authorIP);
            const li = document.createElement('li');
            li.className = 'msg-container';
            li.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.7em; margin-bottom:5px;">
                    <span style="color:#a29bfe; font-weight:bold;">${data.authorIP}</span>
                    ${!isAlreadyFriend ? `<button class="btn-add-friend" onclick="addFriend('${data.authorIP}', this)">+</button>` : '<span style="color:gray;">Allié ✓</span>'}
                </div>
                <div>${data.isImage ? `<img src="${data.text}" style="max-width:100%; border-radius:10px;">` : data.text}</div>
            `;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
