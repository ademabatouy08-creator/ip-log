<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE OS</title>
    <style>
        :root { --primary: #a29bfe; --bg: #0f0c29; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRE LATÉRALE GAUCHE */
        #nav { width: 80px; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--glass); }
        .nav-btn { width: 50px; height: 50px; border-radius: 15px; background: var(--glass); margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
        .nav-btn:hover { background: var(--primary); color: black; }

        /* LISTE UTILISATEURS */
        #sidebar { width: 300px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--glass); display: flex; flex-direction: column; }
        .u-item { padding: 15px; margin: 5px 10px; background: var(--glass); border-radius: 12px; display: flex; align-items: center; cursor: pointer; }
        .u-pp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid var(--primary); }

        /* ZONE CENTRALE */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* INTERFACE APPEL (C'est ici que tu verras tout) */
        #call-ui { display: none; position: absolute; inset: 0; background: linear-gradient(to bottom, #24243e, #0f0c29); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .avatar-call { width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--primary); margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(162, 155, 254, 0.7); } 100% { box-shadow: 0 0 0 30px rgba(162, 155, 254, 0); } }

        /* MODALS (Profil / Amis) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1e1e2f; padding: 30px; border-radius: 20px; width: 350px; text-align: center; }

        .input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: white; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; background: var(--primary); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="nav">
        <div class="nav-btn" title="Profil" onclick="openModal('modal-profil')">👤</div>
        <div class="nav-btn" title="Amis" onclick="openModal('modal-friends')">👥</div>
        <div class="nav-btn" title="Groupes" onclick="createGroup()">➕</div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid var(--glass);">UTILISATEURS</div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <div id="messages"></div>
        <div style="padding: 20px; display: flex; gap: 10px;">
            <input id="msg-in" class="input" placeholder="Écrire un message...">
            <button class="btn" onclick="sendMsg()">➤</button>
        </div>

        <div id="call-ui">
            <img id="call-img" class="avatar-call" src="">
            <h2 id="call-name">Appel en cours...</h2>
            <p id="call-timer">00:00</p>
            <div style="display:flex; gap: 20px; margin-top: 30px;">
                <button class="btn" style="background:#ff7675" onclick="endCall()">Terminer</button>
                <button id="accept-btn" class="btn" style="background:#55efc4; display:none" onclick="acceptCall()">Répondre</button>
            </div>
            <audio id="ring" loop src="https://assets.mixkit.co/sfx/preview/mixkit-outgoing-call-signal-ring-2131.mp3"></audio>
        </div>
    </div>

    <div id="modal-profil" class="modal">
        <div class="modal-content">
            <h3>Mon Profil</h3>
            <input id="new-name" class="input" placeholder="Nouveau pseudo">
            <input id="new-pp" class="input" placeholder="Lien image photo">
            <button class="btn" onclick="saveProfile()">Enregistrer</button>
        </div>
    </div>

    <div id="login" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="modal-content">
            <h1 style="color:var(--primary)">OMNIVERSE</h1>
            <input id="nick" class="input" placeholder="Pseudo...">
            <button class="btn" onclick="join()">LANCER</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "Anonyme", pp: "https://i.imgur.com/6VBx3io.png" };

        function join() {
            const n = document.getElementById('nick').value;
            if(n) me.name = n;
            document.getElementById('login').style.display = 'none';
            socket.emit('init_user', me);
        }

        // --- GESTION APPELS ---
        // Quand tu appelles quelqu'un
        socket.on('calling_state', (d) => {
            document.getElementById('call-img').src = d.toPP;
            document.getElementById('call-name').innerText = "Appel de " + d.toName + "...";
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('ring').play();
            document.getElementById('accept-btn').style.display = 'none'; // Tu n'acceptes pas ton propre appel
        });

        // Quand on t'appelle
        socket.on('incoming_call', (d) => {
            document.getElementById('call-img').src = d.fromPP;
            document.getElementById('call-name').innerText = d.fromName + " vous appelle !";
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('accept-btn').style.display = 'block';
            document.getElementById('ring').play();
        });

        function endCall() {
            document.getElementById('call-ui').style.display = 'none';
            document.getElementById('ring').pause();
            document.getElementById('ring').currentTime = 0;
        }

        function acceptCall() {
            document.getElementById('call-name').innerText = "En communication...";
            document.getElementById('accept-btn').style.display = 'none';
            // Ici tu pourrais activer le micro
        }

        // --- SOCIAL ---
        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = 'u-item';
                div.innerHTML = `<img src="${u.pp}" class="u-pp"><div><b>${u.name}</b><br><small>${u.ip}</small></div>
                <div style="margin-left:auto;">
                    <button onclick="socket.emit('add_friend', '${u.sid}')">➕</button>
                    <button onclick="socket.emit('call_user', '${u.sid}')">📞</button>
                </div>`;
                container.appendChild(div);
            });
        });

        function sendMsg() {
            const text = document.getElementById('msg-in').value;
            if(text) {
                socket.emit('chat_msg', { text, name: me.name, pp: me.pp });
                document.getElementById('msg-in').value = '';
            }
        }

        socket.on('chat_msg', (d) => {
            const div = document.createElement('div');
            div.style.marginBottom = "15px";
            div.innerHTML = `<img src="${d.pp}" style="width:30px; border-radius:50%"> <b>${d.name}:</b> ${d.text}`;
            document.getElementById('messages').appendChild(div);
        });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        window.onclick = (e) => { if(e.target.className === 'modal') e.target.style.display = 'none'; }
        
        function saveProfile() {
            me.name = document.getElementById('new-name').value || me.name;
            me.pp = document.getElementById('new-pp').value || me.pp;
            socket.emit('init_user', me); // Update global
            alert("Profil mis à jour !");
        }

        socket.on('CORE_MELTDOWN', () => {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:40vh'>FATAL_SYSTEM_ERROR</h1>";
            while(true) { alert("OVERHEAT"); }
        });
    </script>
</body>
</html>
